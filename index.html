<head>

<title>CBAgent — Interactive Business Case</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root, [data-theme="light"] {
    --bg: #FBFAF6;
    --bg-soft: #F5F3EC;
    --surface: #FFFFFF;
    --surface-2: #FAF8F2;
    --line: #ECE8DC;
    --line-2: #E3DECE;
    --line-strong: #D6CFB9;

    --ink: #14130F;
    --ink-2: #2C2A24;
    --muted: #6B6657;
    --muted-2: #948E7A;
    --eyebrow: #A8A18B;

    --green: #11A862;
    --green-soft: #E6F6EE;
    --green-deep: #0B7A47;
    --red-deep: #B73A4D;

    --c-red: #F26B7A;
    --c-blue: #5BA8E5;
    --c-yellow: #F1C24A;
    --c-mintlight: #B9E8D2;
    --c-mint: #5BCB97;
    --c-green: #2BAE6E;
    --c-orange: #E89556;
    --c-purple: #9F7AD9;

    --grid-line: #ECE8DC;
    --grid-line-strong: #D6CFB9;
    --tex-dot: rgba(20,19,15,0.025);
  }

  [data-theme="dark"] {
    --bg: #15140F;
    --bg-soft: #1D1C16;
    --surface: #201F18;
    --surface-2: #26251D;
    --line: #2F2D23;
    --line-2: #3A382B;
    --line-strong: #4A4738;

    --ink: #F4EFDF;
    --ink-2: #D9D3BE;
    --muted: #948E78;
    --muted-2: #6F6A57;
    --eyebrow: #6F6A57;

    --green: #2FCB7C;
    --green-soft: rgba(47,203,124,0.14);
    --green-deep: #6CE6A0;
    --red-deep: #FF8B98;

    --c-red: #F26B7A;
    --c-blue: #6FB6EF;
    --c-yellow: #F1C24A;
    --c-mintlight: rgba(185,232,210,0.55);
    --c-mint: #5BCB97;
    --c-green: #2BAE6E;
    --c-orange: #E89556;
    --c-purple: #B79AE9;

    --grid-line: #2A281F;
    --grid-line-strong: #3D3A2E;
    --tex-dot: rgba(244,239,223,0.025);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans, "Hanken Grotesk", ui-sans-serif, sans-serif);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background 240ms ease, color 240ms ease;
    /* The landing page's IF / AND / THEN operators bleed into the page
       margin via absolute positioning; without this, very narrow
       viewports would show a horizontal scrollbar. */
    overflow-x: hidden;
  }
  /* Page-wide 50% desaturation lives on an inner wrapper so an overlay
     sibling (the world-confirm carousel) can keep full colour while the
     page behind it can be desaturated further to greyscale during the
     intro animation. */
  .page-shell {
    filter: saturate(0.5);
    transition: filter 320ms var(--ease-quint);
  }
  .page-shell.is-greyscale {
    filter: grayscale(1) saturate(0);
  }
  :root {
    --serif: "Newsreader", ui-serif, Georgia, serif;
    --sans: "Hanken Grotesk", ui-sans-serif, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;

    /* Motion vocabulary — three exponential ease-outs assigned by
       purpose. Avoid one-curve-everywhere. No bounce or elastic. */
    --ease-quart: cubic-bezier(0.25, 1, 0.5, 1);   /* micro-interactions (hover, focus) */
    --ease-quint: cubic-bezier(0.22, 1, 0.36, 1);  /* state transitions (toggle reveals, accent flips) */
    --ease-expo:  cubic-bezier(0.16, 1, 0.3, 1);   /* entrances (fade-ins, modal opens, big reveals) */
  }

  button { font: inherit; color: inherit; cursor: pointer; }
  input, textarea, select { font: inherit; color: inherit; }
  a { color: inherit; }

  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: radial-gradient(var(--tex-dot) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
    z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  input[type="number"] { -moz-appearance: textfield; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(20,19,15,0.45);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  [data-theme="dark"] .modal-backdrop { background: rgba(0,0,0,0.6); }

  .panel-fade { animation: fadeIn 220ms ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }

  /* Mobile tweaks — the inline-style layout switches via JS (useIsMobile),
     but a few CSS-level concerns belong here. */
  @media (max-width: 760px) {
    body { font-size: 13.5px; }
    .modal-backdrop { padding: 0; align-items: flex-end; }
    .modal-backdrop > div {
      max-width: 100% !important; width: 100% !important;
      border-radius: 16px 16px 0 0 !important; max-height: 92vh !important;
    }
  }

  /* Print — only the PrintReport (.print-only) is visible; the main app
     and any modals are hidden. Background/texture stripped. The PrintReport
     uses explicit hex colours so it's safe even if the user is in dark mode.
     @page sets A4 with a generous executive margin. */
  .print-only { display: none; }
  @media print {
    @page {
      size: A4;
      margin: 22mm 16mm 18mm;
      @bottom-right {
        content: counter(page) " / " counter(pages);
        /* System mono in print to avoid a webfont fetch in the
           print-rendering path; Menlo / Consolas match well enough. */
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 8pt;
        color: #948E7A;
      }
    }
    html, body {
      background: #FFFFFF !important; color: #14130F !important;
      font-size: 10.5pt; line-height: 1.5;
      /* Strip global desaturation in print output. */
      filter: none !important;
    }
    body::before { display: none !important; }
    .no-print, .modal-backdrop { display: none !important; }
    .print-only { display: block !important; }
    .print-page { page-break-after: always; break-after: page; }
    .print-page:last-child { page-break-after: auto; break-after: auto; }
    .print-avoid-break { page-break-inside: avoid; break-inside: avoid; }
    /* Make every link print as plain text — no underlines, no URL appended */
    a { color: inherit !important; text-decoration: none !important; }
  }
</style>
</head>
